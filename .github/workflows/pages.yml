name: Deploy to GitHub Pages

on:
  push:
    branches: [feature/metric-detail-and-landing, master]
    paths: ['productos/public/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: productos/public
      - id: deployment
        uses: actions/deploy-pages@v4
